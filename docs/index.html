<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Krellixx | Solar Descent</title>
    <meta
      name="description"
      content="Fullscreen cinematic: black void, distant light, solar system reveal, and drone flyover of Earth."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="spaceCanvas" aria-label="Solar cinematic scene"></canvas>

    <div id="hud">
      <div id="status">Initializing deep-space sequence...</div>
      <div id="subStatus">No interaction required</div>
    </div>

    <div id="droneOverlay" aria-hidden="true">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="scan"></div>
      <div class="telemetry">DRONE CAM // EARTH TRIPLE PASS // AUTO FLIGHT</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
