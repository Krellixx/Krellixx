<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Krellixx | Solar Descent</title>
    <meta
      name="description"
      content="Cinematic auto-journey from a distant spark to solar system to Earth drone flyover."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="spaceCanvas" aria-label="Solar system cinematic"></canvas>
    <div id="overlay">
      <div id="title">KRELLIXX // SOLAR DESCENT</div>
      <div id="phaseLabel">Phase 1: Deep Space Signal</div>
      <div id="hud" class="hidden">
        <div>DRONE CAM // EARTH RECON</div>
        <div id="cityLabel">Target City: --</div>
        <div id="timerLabel">T+00:00</div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
